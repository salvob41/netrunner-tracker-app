name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          # Expo web export outputs to dist/
          EXPO_PUBLIC_BASE_PATH: /netrunner-tracker-app/

      - name: Rewrite asset URLs for GitHub Pages subpath
        run: |
          node - <<'SCRIPT'
          const fs = require('fs');
          const path = require('path');

          const basePath = '/netrunner-tracker-app';
          const distDir = 'dist';
          const indexPath = path.join(distDir, 'index.html');

          let indexHtml = fs.readFileSync(indexPath, 'utf8');
          indexHtml = indexHtml
            .replaceAll('href="/', `href="${basePath}/`)
            .replaceAll('src="/', `src="${basePath}/`);
          fs.writeFileSync(indexPath, indexHtml);

          const webDir = path.join(distDir, '_expo', 'static', 'js', 'web');
          for (const entry of fs.readdirSync(webDir)) {
            if (!entry.endsWith('.js')) continue;
            const filePath = path.join(webDir, entry);
            let js = fs.readFileSync(filePath, 'utf8');
            js = js
              .replaceAll('"/assets/', `"${basePath}/assets/`)
              .replaceAll('"/_expo/', `"${basePath}/_expo/`);
            fs.writeFileSync(filePath, js);
          }
          SCRIPT

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
