name: Build Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: 1
      FLET_CLI_NO_RICH_OUTPUT: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flet
        run: pip install flet==0.82.2

      # If ANDROID_KEYSTORE_B64 and passwords are not set, each run uses a different
      # ad‑hoc key → in‑place upgrades from prior APKs fail; uninstall the old app first
      # or add repo secrets and keep the same .jks for all releases. See README.
      - name: Optional upload keystore (for consistent signatures)
        run: |
          if [ -n "$B64" ]; then
            echo "$B64" | base64 -d > "$RUNNER_TEMP/netrunner-upload.jks"
            {
              echo "FLET_ANDROID_SIGNING_KEY_STORE=$RUNNER_TEMP/netrunner-upload.jks"
              echo "FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD=$STORE_PASS"
            } >> "$GITHUB_ENV"
            if [ -n "$KEY_PASS" ]; then
              echo "FLET_ANDROID_SIGNING_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"
            fi
            echo "FLET_ANDROID_SIGNING_KEY_ALIAS=${ALIAS:-upload}" >> "$GITHUB_ENV"
            echo "Release keystore will be used for signing."
          else
            echo "No ANDROID_KEYSTORE_B64 secret — new debug-style signature each build (uninstall old APK to upgrade)."
          fi
        env:
          B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build APK
        run: flet build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: netrunner-tracker-apk
          path: build/apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/apk/*.apk
          generate_release_notes: true
